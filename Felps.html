<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Felps Create</title>

  <!-- Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --chumbo: #2E2E2E;
      --azul-claro: #9CC7E0;
      --branco: #F5F5F5;
    }

    body {
      background: linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.85)),
                  url('Felps.png') center/cover no-repeat;
      min-height: 100vh;
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--branco);

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;

      padding: 40px 20px;

      position: relative;
      overflow: hidden;
    }

    .logo {
      width: 130px;
      height: 130px;
      margin-bottom: 20px;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .title {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      margin: 10px 0 5px;
      text-shadow: 0 4px 20px rgba(0,0,0,.8);
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--azul-claro);
      margin-bottom: 40px;
      line-height: 1.5;
      opacity: 0.9;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      /*gap: 1rem;*/
      width: 100%;
      max-width: 380px;
    }

    /* BOTÃO GLASS */
    .btn-glass {
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      width: 100%;

      padding: 14px 20px;
      border-radius: 999px;

      background: rgba(255,255,255,.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
        -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;

      border: 1px solid rgba(255,255,255,.15);

      color: var(--azul-claro);
      font-weight: 600;


      box-shadow:
        0 8px 30px rgba(0,0,0,.4),
        inset 0 1px 0 rgba(255,255,255,.1);

  transition: all .2s ease;
    }
/*  desktop  */
    .btn-glass:hover {
            /*color: var(--azul-claro);*/
  background: rgba(171,200,231,1.50);
  color: #000;

  transform: translateY(-2px);

  box-shadow:
    0 0 25px rgba(120,150,255,.5),
    0 0 10px rgba(120,150,255,.4);
    }
/*-----------------MOBILE---------*/
    .btn-glass:active {
  transform: scale(0.96);

  background: rgba(156,199,224,0.35);

  box-shadow:
    0 0 15px rgba(120,150,255,.4);
}

/*aCESSO*/
.btn-glass:focus {
  outline: none;

  box-shadow:
    0 0 0 2px rgba(156,199,224,.6);
}

    /* ANIMAÇÕES */
    .slide-in-top {
      opacity: 0;
      transform: translateY(-30px);
      animation: slideInTop 1s cubic-bezier(.25,.46,.45,.94) forwards .2s;
    }

    .fade-in-delayed {
      opacity: 0;
      animation: fadeIn 1s ease-out forwards .6s;
    }

    .fade-in-delayed-more {
      opacity: 0;
      transform: translateY(20px);
      animation: slideInBottom 1s cubic-bezier(.25,.46,.45,.94) forwards .9s;
    }

    /* BOTÕES ANIMAÇÃO */
    .links a {
      opacity: 0;
      transform: translateY(30px) scale(.95);
      filter: blur(6px);
      animation: revealBtn .8s ease forwards;
    }

    .links a:nth-child(1) { animation-delay: .3s; }
    .links a:nth-child(2) { animation-delay: .5s; }
    .links a:nth-child(3) { animation-delay: .7s; }
    .links a:nth-child(4) { animation-delay: .9s; }

    /* KEYFRAMES */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideInTop {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInBottom {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes revealBtn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(.95);
        filter: blur(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

.container {
  position: relative;
  overflow: hidden;

  max-width: 420px;
  padding: 55px 28px;
  

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);

  -webkit-backdrop-filter: blur(18px);

  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  
  box-shadow:
    0 20px 60px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.15);


}
.container::before {
  content: "";
  position: absolute;
  inset: 0;

  border-radius: 20px;

  background: linear-gradient(
    120deg,
    rgba(255,255,255,0.25),
    rgba(255,255,255,0.02)
  );

  opacity: 0.3;
  pointer-events: none;

}
    .container * {
  position: relative;

}
/*MOBILE*/
@media (max-width: 480px) {
  .links {
    align-items: center; /* centraliza os botões */
  }

@media (max-width: 480px) {
  .btn-glass {
    width: 85%;
    padding: 16px;
    font-size: 0.9rem;
  }
}

@media (max-width: 480px) {
  .container {
    margin: 20px;
    max-width: 320px; /* antes ~380+ */
    padding: 40px 20px;
  }
}
    footer {
      margin-top: auto;
      font-size: .85rem;
      color: #aaa;
      padding: 30px 0 10px;
    }
    
@media (max-width: 480px) {
  body {
    height: auto;        /* libera altura */
    min-height: 100vh;   /* mantém layout */
    overflow-y: auto;    /* permite rolar */
  }
}

  </style>
</head>

<body>

  <div class="container">
  <img src="logo.png" class="logo" alt="Logo">



  <h1 class="title slide-in-top">Felps Create</h1>

  <p class="subtitle fade-in-delayed">
    Todo negócio merece uma imagem profissional.
  </p>

  <div class="links fade-in-delayed-more">

    <a class="" href="https://wa.me/5551993981995">
      <i class="fa-brands fa-whatsapp"></i>
      <span>WhatsApp</span>
    </a>

    <a class="" href="https://www.instagram.com/felps.design/">
      <i class="fa-brands fa-instagram"></i>
      <span>Instagram</span>
    </a>

    <a class="" href="https://www.behance.net/felipefarias23">
      <i class="fa-brands fa-behance"></i>
      <span>Portfólio</span>
    </a>

    <a class="" href="#">
      <i class="fa-solid fa-link"></i>
      <span>Veja mais</span>
    </a>

  </div>

  <footer>
    © 2025 Felps Create
  </footer>

  <script src="app.js"></script>

</body>
</html>
